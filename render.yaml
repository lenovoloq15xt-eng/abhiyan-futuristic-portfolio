services:
  - type: web
    name: abhiyan-portfolio
    runtime: node
    plan: free
    buildCommand: npm install && npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_USERNAME
        value: abhiyan
      - key: MONGO_URI
        sync: false
      - key: ADMIN_EMAIL
        value: admin@abhiyan.dev
      - key: ADMIN_PASSWORD
        sync: false
